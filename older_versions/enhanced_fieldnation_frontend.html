<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FieldNation Work Orders - Resume Database System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        .header h1 {
            color: #2c3e50;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .header p {
            color: #7f8c8d;
            font-size: 1.1rem;
        }

        .control-panel {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        .control-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            min-width: 200px;
        }

        .control-group label {
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        .control-group input,
        .control-group select,
        .control-group textarea {
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .control-group input:focus,
        .control-group select:focus,
        .control-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .btn-success {
            background: linear-gradient(135deg, #56ab2f 0%, #a8e6cf 100%);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(86, 171, 47, 0.4);
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            color: #7f8c8d;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .work-orders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .work-order-tile {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            position: relative;
            overflow: hidden;
        }

        .work-order-tile:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(31, 38, 135, 0.5);
        }

        .work-order-tile.matched {
            border-left: 5px solid #56ab2f;
        }

        .match-score {
            position: absolute;
            top: 10px;
            right: 10px;
            background: linear-gradient(135deg, #56ab2f 0%, #a8e6cf 100%);
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .work-order-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 10px;
            line-height: 1.3;
        }

        .work-order-company {
            font-size: 1rem;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .work-order-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 0.9rem;
            color: #7f8c8d;
        }

        .work-order-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 10px;
        }

        .tag {
            background: #e3f2fd;
            color: #1976d2;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .tag.industry {
            background: #f3e5f5;
            color: #7b1fa2;
        }

        .tag.complexity {
            background: #fff3e0;
            color: #ef6c00;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 30px;
        }

        .pagination button {
            padding: 8px 12px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .pagination button:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .pagination button.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: white;
            margin: 3% auto;
            padding: 0;
            border-radius: 12px;
            width: 90%;
            max-width: 800px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            border-radius: 12px 12px 0 0;
            position: relative;
        }

        .modal-header h2 {
            margin: 0;
            font-size: 1.5rem;
        }

        .close {
            position: absolute;
            top: 15px;
            right: 20px;
            color: white;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .close:hover {
            transform: scale(1.1);
        }

        .modal-body {
            padding: 30px;
        }

        .detail-section {
            margin-bottom: 25px;
        }

        .detail-section h3 {
            color: #2c3e50;
            font-size: 1.2rem;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 2px solid #e0e0e0;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .detail-item {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
        }

        .detail-label {
            font-weight: 600;
            color: #495057;
            font-size: 0.9rem;
        }

        .detail-value {
            color: #2c3e50;
            margin-top: 3px;
        }

        .tech-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .tech-tag {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 50%;
            border-top-color: #667eea;
            animation: spin 1s ease-in-out infinite;
            margin-left: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }

        .success {
            background: #e8f5e8;
            color: #2e7d32;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }

        .job-match-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        .job-match-section h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        .job-description-input {
            width: 100%;
            min-height: 120px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            margin-bottom: 15px;
        }

        .match-reasons {
            margin-top: 10px;
        }

        .match-reason {
            background: #e8f5e8;
            color: #2e7d32;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            display: inline-block;
            margin: 2px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .work-orders-grid {
                grid-template-columns: 1fr;
            }
            
            .control-row {
                flex-direction: column;
                align-items: stretch;
            }
            
            .modal-content {
                width: 95%;
                margin: 10px auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🛠️ FieldNation Work Orders</h1>
            <p>Comprehensive work order management and job matching system</p>
        </div>

        <!-- Control Panel -->
        <div class="control-panel">
            <div class="control-row">
                <button class="btn btn-success" onclick="importWorkOrders()">
                    📥 Import All Work Orders
                </button>
                <button class="btn btn-primary" onclick="loadWorkOrders()">
                    🔄 Refresh Data
                </button>
                <button class="btn btn-secondary" onclick="loadStats()">
                    📊 Load Statistics
                </button>
            </div>
            
            <!-- Filters -->
            <div class="control-row">
                <div class="control-group">
                    <label>Company Filter</label>
                    <input type="text" id="companyFilter" placeholder="Filter by company...">
                </div>
                <div class="control-group">
                    <label>Industry</label>
                    <select id="industryFilter">
                        <option value="">All Industries</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>Work Type</label>
                    <select id="workTypeFilter">
                        <option value="">All Work Types</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>Location</label>
                    <input type="text" id="locationFilter" placeholder="Filter by location...">
                </div>
                <button class="btn btn-primary" onclick="applyFilters()">Apply Filters</button>
            </div>
        </div>

        <!-- Job Matching Section -->
        <div class="job-match-section">
            <h2>🎯 Job Description Matching</h2>
            <div class="control-group">
                <label>Job Description</label>
                <textarea id="jobDescription" class="job-description-input" 
                          placeholder="Paste a job description here to find matching work orders..."></textarea>
            </div>
            <button class="btn btn-primary" onclick="matchJobDescription()">Find Matching Work Orders</button>
        </div>

        <!-- Statistics -->
        <div class="stats-container" id="statsContainer">
            <!-- Stats will be loaded dynamically -->
        </div>

        <!-- Work Orders Grid -->
        <div id="workOrdersContainer">
            <div class="loading">Loading work orders...</div>
        </div>

        <!-- Pagination -->
        <div class="pagination" id="pagination">
            <!-- Pagination will be generated dynamically -->
        </div>
    </div>

    <!-- Modal for Work Order Details -->
    <div id="workOrderModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Work Order Details</h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Content will be loaded dynamically -->
            </div>
        </div>
    </div>

    <script>
        // Global variables
        let currentPage = 1;
        let totalPages = 1;
        let currentFilters = {};
        let allWorkOrders = [];
        let matchedWorkOrders = [];

        // Initialize the page
        document.addEventListener('DOMContentLoaded', function() {
            loadStats();
            loadWorkOrders();
            setupFilterOptions();
        });

        // Load statistics
        async function loadStats() {
            try {
                const response = await fetch('/api/work-orders/stats');
                const data = await response.json();
                
                if (data.success) {
                    displayStats(data.stats);
                } else {
                    console.error('Error loading stats:', data.error);
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // Display statistics
        function displayStats(stats) {
            const container = document.getElementById('statsContainer');
            container.innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${stats.total_work_orders || 0}</div>
                    <div class="stat-label">Total Work Orders</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">$${(stats.financial_stats?.total_earnings || 0).toLocaleString()}</div>
                    <div class="stat-label">Total Earnings</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">$${(stats.financial_stats?.avg_pay || 0).toFixed(0)}</div>
                    <div class="stat-label">Average Pay</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${stats.industry_breakdown?.length || 0}</div>
                    <div class="stat-label">Industries</div>
                </div>
            `;
        }

        // Load work orders
        async function loadWorkOrders(page = 1) {
            try {
                document.getElementById('workOrdersContainer').innerHTML = '<div class="loading">Loading work orders...</div>';
                
                const params = new URLSearchParams({
                    page: page,
                    per_page: 20,
                    ...currentFilters
                });
                
                const response = await fetch(`/api/work-orders/fieldnation?${params}`);
                const data = await response.json();
                
                if (data.success) {
                    allWorkOrders = data.work_orders;
                    currentPage = data.pagination.page;
                    totalPages = data.pagination.pages;
                    displayWorkOrders(data.work_orders);
                    updatePagination();
                } else {
                    document.getElementById('workOrdersContainer').innerHTML = 
                        `<div class="error">Error loading work orders: ${data.error}</div>`;
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('workOrdersContainer').innerHTML = 
                    '<div class="error">Failed to load work orders. Please try again.</div>';
            }
        }

        // Display work orders in grid
        function displayWorkOrders(workOrders) {
            const container = document.getElementById('workOrdersContainer');
            
            if (!workOrders || workOrders.length === 0) {
                container.innerHTML = '<div class="loading">No work orders found.</div>';
                return;
            }
            
            const grid = document.createElement('div');
            grid.className = 'work-orders-grid';
            
            workOrders.forEach(wo => {
                const tile = createWorkOrderTile(wo);
                grid.appendChild(tile);
            });
            
            container.innerHTML = '';
            container.appendChild(grid);
        }

        // Create work order tile
        function createWorkOrderTile(workOrder) {
            const tile = document.createElement('div');
            tile.className = 'work-order-tile';
            
            if (workOrder.match_score) {
                tile.classList.add('matched');
            }
            
            const technologies = workOrder.technologies_used || [];
            const skills = workOrder.required_skills || [];
            
            tile.innerHTML = `
                ${workOrder.match_score ? `<div class="match-score">${(workOrder.match_score * 100).toFixed(0)}% Match</div>` : ''}
                <div class="work-order-title">${workOrder.title || 'No Title'}</div>
                <div class="work-order-company">${workOrder.buyer_company || 'Unknown Company'}</div>
                <div class="work-order-meta">
                    <span>📅 ${workOrder.service_date || 'No Date'}</span>
                    <span>💰 $${workOrder.pay_amount || 0}</span>
                </div>
                <div class="work-order-meta">
                    <span>📍 ${workOrder.location || 'Unknown Location'}</span>
                </div>
                <div class="work-order-tags">
                    ${workOrder.work_type ? `<span class="tag">${workOrder.work_type}</span>` : ''}
                    ${workOrder.industry_category ? `<span class="tag industry">${workOrder.industry_category}</span>` : ''}
                    ${workOrder.complexity_level ? `<span class="tag complexity">${workOrder.complexity_level}</span>` : ''}
                </div>
                ${workOrder.match_reasons ? `
                    <div class="match-reasons">
                        ${workOrder.match_reasons.map(reason => `<span class="match-reason">${reason}</span>`).join('')}
                    </div>
                ` : ''}
            `;
            
            tile.onclick = () => showWorkOrderDetails(workOrder.id);
            
            return tile;
        }

        // Show work order details in modal
        async function showWorkOrderDetails(workOrderId) {
            try {
                const response = await fetch(`/api/work-orders/fieldnation/${workOrderId}`);
                const data = await response.json();
                
                if (data.success) {
                    displayWorkOrderModal(data.work_order);
                } else {
                    alert('Error loading work order details: ' + data.error);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Failed to load work order details. Please try again.');
            }
        }

        // Display work order modal
        function displayWorkOrderModal(workOrder) {
            document.getElementById('modalTitle').textContent = workOrder.title || 'Work Order Details';
            
            const modalBody = document.getElementById('modalBody');
            modalBody.innerHTML = `
                <div class="detail-section">
                    <h3>📋 Basic Information</h3>
                    <div class="detail-grid">
                        <div class="detail-item">
                            <div class="detail-label">Work Order ID</div>
                            <div class="detail-value">${workOrder.fn_work_order_id || 'N/A'}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Company</div>
                            <div class="detail-value">${workOrder.buyer_company || 'N/A'}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Service Date</div>
                            <div class="detail-value">${workOrder.service_date || 'N/A'}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Location</div>
                            <div class="detail-value">${workOrder.location || 'N/A'}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Pay Amount</div>
                            <div class="detail-value">$${workOrder.pay_amount || 0}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Status</div>
                            <div class="detail-value">${workOrder.status || 'N/A'}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Work Type</div>
                            <div class="detail-value">${workOrder.work_type || 'N/A'}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Industry</div>
                            <div class="detail-value">${workOrder.industry_category || 'N/A'}</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Complexity</div>
                            <div class="detail-value">${workOrder.complexity_level || 'N/A'}</div>
                        </div>
                    </div>
                </div>
                
                ${workOrder.work_description ? `
                    <div class="detail-section">
                        <h3>📝 Work Description</h3>
                        <div class="detail-value">${workOrder.work_description}</div>
                    </div>
                ` : ''}
                
                ${workOrder.technologies_used && workOrder.technologies_used.length > 0 ? `
                    <div class="detail-section">
                        <h3>💻 Technologies Used</h3>
                        <div class="tech-grid">
                            ${workOrder.technologies_used.map(tech => `<span class="tech-tag">${tech}</span>`).join('')}
                        </div>
                    </div>
                ` : ''}
                
                ${workOrder.required_skills && workOrder.required_skills.length > 0 ? `
                    <div class="detail-section">
                        <h3>🎯 Required Skills</h3>
                        <div class="tech-grid">
                            ${workOrder.required_skills.map(skill => `<span class="tech-tag">${skill}</span>`).join('')}
                        </div>
                    </div>
                ` : ''}
                
                ${workOrder.required_tools && workOrder.required_tools.length > 0 ? `
                    <div class="detail-section">
                        <h3>🔧 Required Tools</h3>
                        <div class="tech-grid">
                            ${workOrder.required_tools.map(tool => `<span class="tech-tag">${tool}</span>`).join('')}
                        </div>
                    </div>
                ` : ''}
            `;
            
            document.getElementById('workOrderModal').style.display = 'block';
        }

        // Close modal
        function closeModal() {
            document.getElementById('workOrderModal').style.display = 'none';
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('workOrderModal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        }

        // Match job description
        async function matchJobDescription() {
            const jobDescription = document.getElementById('jobDescription').value.trim();
            
            if (!jobDescription) {
                alert('Please enter a job description to match against.');
                return;
            }
            
            try {
                document.getElementById('workOrdersContainer').innerHTML = '<div class="loading">Finding matching work orders...</div>';
                
                const response = await fetch('/api/work-orders/job-match', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        job_description: jobDescription,
                        limit: 20
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    matchedWorkOrders = data.matches;
                    displayWorkOrders(data.matches);
                    
                    // Show success message
                    const successMsg = document.createElement('div');
                    successMsg.className = 'success';
                    successMsg.textContent = `Found ${data.matches.length} matching work orders!`;
                    document.querySelector('.job-match-section').appendChild(successMsg);
                    
                    setTimeout(() => successMsg.remove(), 3000);
                } else {
                    document.getElementById('workOrdersContainer').innerHTML = 
                        `<div class="error">Error matching job description: ${data.error}</div>`;
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('workOrdersContainer').innerHTML = 
                    '<div class="error">Failed to match job description. Please try again.</div>';
            }
        }

        // Import work orders
        async function importWorkOrders() {
            if (!confirm('This will import all work orders from markdown and PDF files. This may take several minutes. Continue?')) {
                return;
            }
            
            try {
                const button = event.target;
                button.disabled = true;
                button.textContent = '⏳ Importing...';
                
                const response = await fetch('/api/work-orders/import-all', {
                    method: 'POST'
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert(`Successfully imported work orders!\n\nResults:\n- Markdown processed: ${data.results.markdown_processed}\n- PDF processed: ${data.results.pdf_processed}\n- Total processed: ${data.results.total_processed}\n- Total failed: ${data.results.total_failed}`);
                    loadStats();
                    loadWorkOrders();
                } else {
                    alert('Error importing work orders: ' + data.error);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Failed to import work orders. Please try again.');
            } finally {
                const button = event.target;
                button.disabled = false;
                button.textContent = '📥 Import All Work Orders';
            }
        }

        // Apply filters
        function applyFilters() {
            currentFilters = {
                company: document.getElementById('companyFilter').value,
                industry: document.getElementById('industryFilter').value,
                work_type: document.getElementById('workTypeFilter').value,
                location: document.getElementById('locationFilter').value
            };
            
            // Remove empty filters
            Object.keys(currentFilters).forEach(key => {
                if (!currentFilters[key]) {
                    delete currentFilters[key];
                }
            });
            
            currentPage = 1;
            loadWorkOrders(1);
        }

        // Setup filter options
        async function setupFilterOptions() {
            try {
                const response = await fetch('/api/work-orders/stats');
                const data = await response.json();
                
                if (data.success && data.stats) {
                    // Populate industry filter
                    const industrySelect = document.getElementById('industryFilter');
                    if (data.stats.industry_breakdown) {
                        data.stats.industry_breakdown.forEach(industry => {
                            const option = document.createElement('option');
                            option.value = industry.industry_category;
                            option.textContent = `${industry.industry_category} (${industry.count})`;
                            industrySelect.appendChild(option);
                        });
                    }
                }
            } catch (error) {
                console.error('Error setting up filter options:', error);
            }
        }

        // Update pagination
        function updatePagination() {
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = '';
            
            if (totalPages <= 1) return;
            
            // Previous button
            const prevBtn = document.createElement('button');
            prevBtn.textContent = 'Previous';
            prevBtn.disabled = currentPage === 1;
            prevBtn.onclick = () => {
                if (currentPage > 1) {
                    loadWorkOrders(currentPage - 1);
                }
            };
            pagination.appendChild(prevBtn);
            
            // Page numbers
            const maxVisiblePages = 5;
            let startPage = Math.max(1, currentPage - Math.floor(maxVisiblePages / 2));
            let endPage = Math.min(totalPages, startPage + maxVisiblePages - 1);
            
            if (endPage - startPage + 1 < maxVisiblePages) {
                startPage = Math.max(1, endPage - maxVisiblePages + 1);
            }
            
            for (let i = startPage; i <= endPage; i++) {
                const pageBtn = document.createElement('button');
                pageBtn.textContent = i;
                pageBtn.className = i === currentPage ? 'active' : '';
                pageBtn.onclick = () => loadWorkOrders(i);
                pagination.appendChild(pageBtn);
            }
            
            // Next button
            const nextBtn = document.createElement('button');
            nextBtn.textContent = 'Next';
            nextBtn.disabled = currentPage === totalPages;
            nextBtn.onclick = () => {
                if (currentPage < totalPages) {
                    loadWorkOrders(currentPage + 1);
                }
            };
            pagination.appendChild(nextBtn);
        }
    </script>
</body>
